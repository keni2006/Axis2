# ============================================================
#  Axis Sphere51 Data Server - configuration
#  Edit the values, save, and restart the server.
#  Lines starting with # or ; are comments.
# ============================================================

# Address the server listens on. 0.0.0.0 = reachable from the LAN.
Url = http://0.0.0.0:5099

# Folder that contains your Sphere scripts.
BaseDirectory = D:\SphereX64-Abyss\GraySvr\x64Release

# Definition files to serve (comma-separated).
# Account/world SAVE files are skipped automatically - do NOT list them here.
ItemFiles  = sphereitem.scp, sphereitem2.scp
CharFiles  = spherechar.scp, spherechar2.scp
MapFiles   = spheremap.scp, spheremap2.scp, spheremap3.scp
SpellFiles = spherespell.scp

# Account file used to log people in (relative to BaseDirectory or an absolute path).
AccountFile = accounts\sphereaccu.scp

# Minimum PLEVEL allowed to connect.
#   2 = staff (Counselor) and above. Players (PLEVEL 0-1) are blocked.
MinPlevel = 2
